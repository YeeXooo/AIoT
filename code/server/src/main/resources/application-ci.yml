spring:
  datasource:
    url: jdbc:h2:mem:aiot;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

aiot:
  security:
    key-store-path: /tmp/aiot-ci-keystore.p12
    voice-evidence-base-path: /tmp/aiot-voice-evidence
  storage:
    base-path: /tmp/aiot-storage
