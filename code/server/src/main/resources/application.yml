server:
  port: 8080

spring:
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── DMS 视觉感知配置 ────────────────────
# 依据: docs/ood_perception_yolo.md §6.1
aiot:
  perception:
    dms:
      mode: mock               # mock | yolo
      grpc-host: localhost
      grpc-port: 50051
      sensor-id: dms_camera_0
      target-fps: 10.0
      frame-timeout-ms: 200
      health-check-interval-sec: 5
