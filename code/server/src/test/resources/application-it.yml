# IT 集成测试 profile — H2 内存库 + Flyway seed 数据
spring:
  datasource:
    url: jdbc:h2:mem:aiot;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: never
  flyway:
    enabled: true

aiot:
  data:
    initialize: false
  security:
    key-store-path: /tmp/aiot-it-keystore.p12
    voice-evidence-base-path: /tmp/aiot-voice-evidence
  storage:
    base-path: /tmp/aiot-storage
