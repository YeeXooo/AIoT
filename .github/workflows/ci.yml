name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================================================================
  # 后端 — 编译 + 测试
  # ===================================================================
  backend:
    name: Backend (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compile
        working-directory: code/server
        run: mvn compile -B -q

      - name: Test
        working-directory: code/server
        run: mvn test -B -Dspring.profiles.active=ci -Dtest='!com.aiot.AiotApplicationTests'

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: JUnit Tests
          path: code/server/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

  # ===================================================================
  # 后端 — Checkstyle
  # ===================================================================
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Checkstyle
        working-directory: code/server
        run: mvn checkstyle:check -B

      - name: Checkstyle Report
        uses: jwgmeligmeyling/checkstyle-github-action@v1
        if: success() || failure()
        with:
          path: code/server/target/checkstyle-result.xml
          name: Checkstyle Report

  # ===================================================================
  # 前端 — TypeScript 类型检查（仅 package.json 存在时运行）
  # ===================================================================
  frontend:
    name: Frontend (tsc)
    needs: []
    runs-on: ubuntu-latest
    if: hashFiles('code/frontend/package.json') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: code/frontend
        run: npm ci

      - name: Type check
        working-directory: code/frontend
        run: npx tsc --noEmit

  # ===================================================================
  # CodeQL 安全扫描
  # ===================================================================
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ===================================================================
  # 依赖审查（仅 PR）
  # ===================================================================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
