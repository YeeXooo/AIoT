name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===================================================================
  # 后端 — 编译 + 测试
  # ===================================================================
  backend:
    name: Backend (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: "${{ matrix.java }}"
          distribution: "temurin"
          cache: maven

      - name: Compile
        run: |
          cd code/server
          mvn compile -B -q

      - name: Test
        run: |
          cd code/server
          mvn verify -B -Dspring.profiles.active=ci

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: JUnit Tests (JDK ${{ matrix.java }})
          path: code/server/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

  # ===================================================================
  # 后端 — Checkstyle
  # ===================================================================
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Checkstyle
        run: |
          cd code/server
          mvn checkstyle:check -B

      - name: Checkstyle Report
        uses: jwgmeligmeyling/checkstyle-github-action@v1
        if: success() || failure()
        with:
          path: code/server/target/checkstyle-result.xml
          name: Checkstyle Report

  # ===================================================================
  # 前端 — TypeScript 类型检查（package.json 存在时启用）
  #
  # ArkTS 项目使用 DevEco Studio 构建，暂无 npm 工具链。
  # 当 code/frontend/ 添加了 package.json + tsconfig.json 后，本 job 自动激活。
  # ===================================================================
  frontend:
    name: Frontend (tsc)
    if: hashFiles('code/frontend/package.json') != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: code/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ===================================================================
  # CodeQL 安全扫描（公开仓库免费）
  # ===================================================================
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ===================================================================
  # 依赖审查
  # ===================================================================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
